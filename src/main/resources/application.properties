# H2 Database
#spring.datasource.url=jdbc:h2:mem:testdb
# mem:testdb - the database exists only in memory
# DB_CLOSE_DELAY=-1 - the database does not close until the applications works
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

#H2 driver
#spring.datasource.driverClassName=org.h2.Driver
spring.datasource.driver-class-name=org.h2.Driver

#user name
spring.datasource.username=sa
#password
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#Settings of JPA / HIBERNATE

#Dialect for H2(how Hibernate applies H2)
# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#strategy of table creating
spring.jpa.hibernate.ddl-auto=create-drop
#it shows SQL-requests in console
spring.jpa.show-sql=true
#formatting SQL to make readable
spring.jpa.properties.hibernate.format_sql=true

#remowe access denied
spring.h2.console.settings.web-allow-others=false
